<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Blog — Oku-tyann's Universe</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Noto+Sans+JP:wght@300;400;700&display=swap');

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #0a0600;
      color: #d4b896;
      font-family: 'Noto Sans JP', sans-serif;
      min-height: 100vh;
    }

    nav {
      padding: 24px 40px;
      display: flex;
      align-items: center;
      gap: 32px;
      border-bottom: 1px solid rgba(160, 100, 20, 0.15);
    }

    nav a {
      text-decoration: none;
      color: #7a5530;
      font-size: 0.8rem;
      letter-spacing: 3px;
      font-family: 'Orbitron', monospace;
      transition: color 0.2s;
    }

    nav a:hover { color: #e0a840; }
    nav a.active { color: #e0a840; }

    .page-header {
      max-width: 800px;
      margin: 60px auto 40px;
      padding: 0 24px;
    }

    .section-label {
      font-family: 'Orbitron', monospace;
      font-size: 0.65rem;
      letter-spacing: 5px;
      color: #7a5530;
      margin-bottom: 6px;
    }

    .page-title {
      font-family: 'Orbitron', monospace;
      font-size: 2rem;
      font-weight: 700;
      color: #e8c070;
      text-shadow: 0 0 20px rgba(220, 160, 60, 0.3);
    }

    .posts {
      max-width: 800px;
      margin: 0 auto;
      padding: 0 24px 80px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .post-card {
      background: linear-gradient(135deg, rgba(30, 18, 6, 0.95), rgba(20, 12, 4, 0.98));
      border: 1px solid rgba(160, 100, 20, 0.2);
      border-radius: 8px;
      padding: 28px 32px;
      text-decoration: none;
      display: block;
      transition: all 0.3s;
      position: relative;
      overflow: hidden;
    }

    .post-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0;
      width: 3px; height: 100%;
      background: linear-gradient(180deg, #c88020, #e0a840);
      box-shadow: 0 0 10px rgba(200, 128, 32, 0.5);
    }

    .post-card:hover {
      border-color: rgba(200, 130, 30, 0.5);
      transform: translateX(4px);
      box-shadow: 0 4px 24px rgba(0,0,0,0.4);
    }

    .post-date {
      font-size: 0.72rem;
      color: #6a4a28;
      letter-spacing: 2px;
      margin-bottom: 8px;
      font-family: 'Orbitron', monospace;
    }

    .post-title {
      font-size: 1.1rem;
      font-weight: 700;
      color: #e0a840;
      margin-bottom: 8px;
      line-height: 1.5;
    }

    .post-excerpt {
      font-size: 0.88rem;
      color: #7a6050;
      line-height: 1.7;
    }

    .post-tags {
      display: flex;
      gap: 6px;
      margin-top: 14px;
      flex-wrap: wrap;
    }

    .tag {
      font-size: 0.68rem;
      padding: 2px 10px;
      border-radius: 2px;
      border: 1px solid rgba(160, 100, 20, 0.3);
      color: #8a6840;
    }
  </style>
</head>
<body>

  <nav>
    <a href="../">HOME</a>
    <a href="./" class="active">BLOG</a>
  </nav>

  <div class="page-header">
    <p class="section-label">// TRANSMISSION LOG</p>
    <h1 class="page-title">Blog</h1>
  </div>

  <div class="posts">

    <a class="post-card" href="./posts/2026-03-09.html">
      <p class="post-date">2026.03.09</p>
      <p class="post-title">AIチームを組んでみた —— ゲーム・ツール・サイトを1日で作った話</p>
      <p class="post-excerpt">Claude Codeと一緒にジャンプゲーム、YouTube要約ツール、ポートフォリオサイトを1日で完成。さらにAI組織の土台も作り始めた初日の記録。</p>
      <div class="post-tags">
        <span class="tag">AI</span>
        <span class="tag">Claude Code</span>
        <span class="tag">制作記録</span>
      </div>
    </a>

  </div>

</body>
</html>
